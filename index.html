<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A2P Error Report — Infozillion</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <header>
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-tag">INFOZILLION TELETECH</span>
        <h1>A2P Error Report</h1>
        <p class="subtitle">Response Code ≠ 9000 · Date-wise Summary</p>
      </div>
      <div class="header-meta" id="headerMeta">—</div>
    </div>
  </header>

  <main>

    <!-- Upload Zone -->
    <section class="upload-section" id="uploadSection">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 32V16M24 16L17 23M24 16L31 23" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 36C5.8 34.4 4 31.9 4 28C4 22.5 8.5 18 14 18C14.3 18 14.6 18 14.9 18.1C16.5 13.4 21 10 26.5 10C33.4 10 39 15.6 39 22.5C39 22.8 39 23.1 38.9 23.4C41.9 24.5 44 27.3 44 30.5C44 34.1 41.1 37 37.5 37" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="upload-title">Drop CSV files here</p>
        <p class="upload-hint">Multiple files supported — <code>X9_M_YYYYMMDD_HH</code> &amp; <code>X9_I_YYYYMMDD_HH</code></p>
        <label class="btn-upload">
          Browse Files
          <input type="file" id="fileInput" accept=".csv" multiple hidden />
        </label>
      </div>

      <div class="file-list" id="fileList"></div>

      <div class="action-row" id="actionRow" style="display:none">
        <button class="btn-generate" id="generateBtn">Generate Report</button>
        <button class="btn-clear" id="clearBtn">Clear All</button>
      </div>
    </section>

    <!-- Report Output -->
    <section class="report-section" id="reportSection" style="display:none">

      <div class="report-header">
        <h2>Summary Report</h2>
        <div class="report-actions">
          <button class="btn-copy" id="copyBtn" title="Copy table as text">
            <svg viewBox="0 0 20 20" fill="none"><rect x="7" y="7" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M13 7V5a1.5 1.5 0 00-1.5-1.5H5A1.5 1.5 0 003.5 5v6.5A1.5 1.5 0 005 13h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Copy
          </button>
          <button class="btn-export" id="exportBtn">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 3v10M10 13l-3-3M10 13l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 15v1a1 1 0 001 1h12a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Export CSV
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table id="reportTable">
          <thead>
            <tr>
              <th>DATE</th>
              <th>MNO</th>
              <th>IPTSP</th>
              <th>TOTAL</th>
            </tr>
          </thead>
          <tbody id="reportBody"></tbody>
          <tfoot id="reportFoot"></tfoot>
        </table>
      </div>

      <div class="parsed-files-info" id="parsedInfo"></div>

    </section>

  </main>

  <footer>
    <span>Infozillion Teletech BD Ltd · Service Assurance</span>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
